<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Painel Digital CMR</title>
  <style>
    :root { 
      --verde: #006837; 
      --amarelo: #fff200; 
      --preto: #000; 
      --branco: #fff; 
      --azul-escuro: #002333;
    }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--preto); font-family: 'Segoe UI', sans-serif; }
    
    /* Layout Principal Corporativo (Versão 50) */
    #painel-principal { display: none; }
    .main-layout { display: flex; width: 100vw; height: calc(100vh - 45px); }
    
    /* Área de Mídia (Esquerda) */
    .midia-area { flex: 3; position: relative; border-right: 5px solid var(--amarelo); box-sizing: border-box; background: #050505; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .fade-in { animation: fadeInEffect 1.2s ease-in-out; }
    @keyframes fadeInEffect { from { opacity: 0; } to { opacity: 1; } }
    #display-conteudo { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    img, iframe { width: 100%; height: 100%; object-fit: cover; border: none; }
    
    #legenda-sobreposta { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 104, 55, 0.9); color: var(--amarelo); padding: 15px 0; text-align: center; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; z-index: 10; display: none; }
    
    /* Barra Lateral Direita (Relógio e Frase) */
    .sidebar { flex: 1.1; background: var(--azul-escuro); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 25px 20px; color: var(--branco); box-sizing: border-box; position: relative; }
    
    /* Logotipo Redondo no Topo */
    .logo-container { width: 220px; height: 220px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); margin-bottom: 40px; border: 4px solid var(--verde); overflow: hidden; }
    .logo-container img { width: 85%; height: 85%; object-fit: contain; }
    
    /* Moldura Amarela do Relógio */
    .relogio-box { width: 90%; border: 3px solid var(--amarelo); border-radius: 18px; padding: 20px 10px; text-align: center; background: rgba(0,0,0,0.2); margin-bottom: 30px; }
    #relogio { font-size: 5rem; font-weight: 900; color: var(--amarelo); margin: 0; line-height: 1; font-family: monospace; }
    #data { font-size: 1.3rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-top: 10px; color: var(--branco); }
    
    /* Caixa da Frase do Dia */
    .frase-box { width: 95%; text-align: center; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 25px; }
    .frase-titulo { color: var(--amarelo); font-size: 1rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
    #texto-frase { font-size: 1.7rem; font-style: italic; font-weight: 600; line-height: 1.4; color: var(--branco); padding: 0 10px; }
    
    /* Avisos em formato de Card de TV */
    .card-aviso-tv { background: var(--verde); border: 5px solid var(--amarelo); border-radius: 15px; padding: 40px; max-width: 85%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .texto-aviso-tv { font-size: 3.2rem; font-weight: bold; color: white; line-height: 1.4; }
    
    /* Rodapé do Letreiro Dinâmico */
    .footer { position: fixed; bottom: 0; width: 100%; background: var(--preto); height: 65px; display: flex; align-items: center; border-top: 3px solid var(--amarelo); z-index: 100; overflow: hidden; }
    .marquee { white-space: nowrap; font-size: 2.3rem; font-weight: bold; color: var(--amarelo); animation: scroll 30s linear infinite; padding-left: 100vw; display: flex; align-items: center; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    .sep { margin: 0 30px; color: var(--branco); font-size: 1.8rem; }

    /* Tela de Autenticação Centralizada */
    #tela-autenticacao { position: fixed; top:0; left:0; width:100vw; height:100vh; background:#111; display:flex; justify-content:center; align-items:center; z-index:9999; }
    .login-box { background: #fff; color:#333; padding: 40px; border-radius: 15px; width: 380px; text-align: center; border-top: 8px solid var(--verde); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
    .login-box h2 { margin-top: 0; color: var(--verde); }
    .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; text-align: center; }
    .login-box button { width: 100%; padding: 14px; background: var(--verde); color: white; border:none; border-radius:8px; font-size:1rem; font-weight:bold; cursor:pointer; text-transform:uppercase; }
    .login-box button:hover { background: #004d29; }
    .msg-erro { color: red; font-size: 0.9rem; margin-top: 10px; display: none; }
  </style>
</head>
<body>

  <div id="tela-autenticacao">
    <div class="login-box">
      <div style="background: var(--verde); padding: 12px; border-radius: 8px; margin-bottom: 15px;">
        <span style="color: var(--amarelo); font-size: 1.8rem; font-weight: bold; letter-spacing: 2px;">PAINEL DIGITAL</span>
      </div>
      <h2>Acesso Restrito</h2>
      <p style="font-size:0.9rem; color:#666;">Insira seu e-mail para receber o código de acesso.</p>
      
      <div id="etapa-email">
        <input type="email" id="email-usuario" placeholder="fcpalharess@gmail.com">
        <button onclick="pedirCodigo()">Receber Código</button>
      </div>

      <div id="etapa-codigo" style="display: none;">
        <input type="text" id="codigo-otp" placeholder="Digite os 6 dígitos" maxlength="6">
        <button onclick="validarCodigo()">Verificar Código</button>
      </div>
      
      <div id="erro-login" class="msg-erro"></div>
    </div>
  </div>

  <div id="painel-principal">
    <div class="main-layout">
      
      <div class="midia-area">
        <div id="display-conteudo">Carregando mídias...</div>
        <div id="legenda-sobreposta"></div>
      </div>
      
      <div class="sidebar">
        <div class="logo-container">
          <img src="https://i.postimg.co/N06Xv6f6/cmr-logo-tv.png" alt="CMR Brasil" onerror="this.src='https://images2.imgbox.com/7b/4b/LwM7fC9W_o.png'">
        </div>
        
        <div class="relogio-box">
          <div id="relogio">00:00:00</div>
          <div id="data">...</div>
        </div>
        
        <div class="frase-box">
          <div class="frase-titulo">Frase do Dia</div>
          <div id="texto-frase">Carregando...</div>
        </div>
      </div>

    </div>
    
    <div class="footer">
      <div class="marquee" id="letreiro">Carregando informações relevantes...</div>
    </div>
  </div>

  <script>
    // Link direto e validado da sua implantação Versão 50
    const URL_API = "https://script.google.com/macros/s/AKfycbyuFkv9tyEwU2pxHBuJ2t5FA6EiskBmzQnrtcHxuPVQRX3v_lBmuwfcQA0zEHpSDvf_pQ/exec";

    let midias = [], frases = [], idxM = 0, idxF = 0;
    let timerMidia = null, timerFrase = null;
    let emailGuardado = "";

    function atualizarRelogio() {
      const agora = new Date();
      document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
      const opt = { weekday: 'long', day: 'numeric', month: 'short' };
      let dataTexto = agora.toLocaleDateString('pt-BR', opt).toUpperCase();
      document.getElementById('data').innerText = dataTexto.replace(".", "");
    }
    setInterval(atualizarRelogio, 1000);

    function verificarLoginExistente() {
      const token = localStorage.getItem("token_cmr");
      if (token === "TOKEN_AUTENTICADO_CMR") {
        document.getElementById("tela-autenticacao").style.display = "none";
        document.getElementById("painel-principal").style.display = "block";
        carregarDadosDireto();
      }
    }

    // Função corrigida buscando o id correto "email-usuario"
    function pedirCodigo() {
      const email = document.getElementById("email-usuario").value.trim();
      const erroDiv = document.getElementById("erro-login");
      if(!email) { alert("Por favor, digite seu e-mail."); return; }
      
      erroDiv.style.display = "none";
      document.querySelector("#etapa-email button").innerText = "Enviando...";

      fetch(`${URL_API}?acao=solicitarCodigo&email=${encodeURIComponent(email)}`)
        .then(r => r.json())
        .then(res => {
          if(res.sucesso) {
            emailGuardado = email;
            document.getElementById("etapa-email").style.display = "none";
            document.getElementById("etapa-codigo").style.display = "block";
          } else {
            erroDiv.innerText = res.erro || "Erro ao processar.";
            erroDiv.style.display = "block";
            document.querySelector("#etapa-email button").innerText = "Receber Código";
          }
        }).catch(() => {
          erroDiv.innerText = "Erro de conexão com o servidor. Verifique a URL_API.";
          erroDiv.style.display = "block";
          document.querySelector("#etapa-email button").innerText = "Receber Código";
        });
    }

    function validarCodigo() {
      const codigo = document.getElementById("codigo-otp").value.trim();
      const erroDiv = document.getElementById("erro-login");
      if(!codigo) { alert("Digite o código recebido."); return; }

      erroDiv.style.display = "none";
      document.querySelector("#etapa-codigo button").innerText = "Verificando...";

      fetch(`${URL_API}?acao=verificarCodigo&email=${encodeURIComponent(emailGuardado)}&codigo=${codigo}`)
        .then(r => r.json())
        .then(res => {
          if (res.autenticado) {
            localStorage.setItem("token_cmr", "TOKEN_AUTENTICADO_CMR");
            
            document.getElementById("tela-autenticacao").style.display = "none";
            document.getElementById("painel-principal").style.display = "block";
            
            midias = res.midias || []; 
            frases = res.frases || [];
            if (res.letreiros && res.letreiros.length > 0) {
              document.getElementById('letreiro').innerHTML = res.letreiros.join(' <span class="sep"> ★ </span> ') + ' <span class="sep"> ★ </span> ';
            }
            girarM(); girarF();
            
            setInterval(carregarDadosDireto, 3000);
          } else {
            erroDiv.innerText = res.erro || "Código inválido.";
            erroDiv.style.display = "block";
            document.querySelector("#etapa-codigo button").innerText = "Verificar Código";
          }
        }).catch(() => {
          erroDiv.innerText = "Erro ao validar código no servidor.";
          erroDiv.style.display = "block";
          document.querySelector("#etapa-codigo button").innerText = "Verificar Código";
        });
    }

    function carregarDadosDireto() {
      fetch(`${URL_API}?token=TOKEN_AUTENTICADO_CMR`)
        .then(response => response.json())
        .then(res => {
          midias = res.midias || []; 
          frases = res.frases || [];
          if (res.letreiros && res.letreiros.length > 0) {
            document.getElementById('letreiro').innerHTML = res.letreiros.join(' <span class="sep"> ★ </span> ') + ' <span class="sep"> ★ </span> ';
          }
          if(!timerMidia && midias.length > 0) girarM();
          if(!timerFrase && frases.length > 0) girarF();
        });
    }

    function extrairIdDrive(url) {
      if (!url) return "";
      const regExp = /(?:id=|\/d\/|src=)([\w-]+)/;
      const match = url.match(regExp);
      return (match && match[1]) ? match[1] : "";
    }

    function girarM() {
      if (timerMidia) clearTimeout(timerMidia);
      if (!midias.length) return;
      
      const item = midias[idxM];
      const box = document.getElementById('display-conteudo');
      const legenda = document.getElementById('legenda-sobreposta');

      box.classList.remove('fade-in');
      void box.offsetWidth; 
      box.classList.add('fade-in');

      if (item.tipo !== "Texto" && item.titulo && item.titulo.trim() !== "") {
        legenda.innerText = item.titulo;
        legenda.style.display = "block";
      } else {
        legenda.style.display = "none";
      }

      let idDrive = extrairIdDrive(item.link);

      if (item.tipo === "Imagem") {
        if(idDrive) {
          box.innerHTML = `<img src="https://drive.google.com/uc?export=view&id=${idDrive}">`;
        } else {
          box.innerHTML = `<img src="${item.link}">`;
        }
      } else if (item.tipo === "Vídeo") {
        if(idDrive) {
          box.innerHTML = `<iframe src="https://drive.google.com/file/d/${idDrive}/preview?autoplay=1&mute=1"></iframe>`;
        } else {
          let linkAdaptado = item.link.includes('youtube.com') ? item.link.replace('watch?v=', 'embed/') : item.link;
          box.innerHTML = `<iframe src="${linkAdaptado}"></iframe>`;
        }
      } else {
        box.innerHTML = `
          <div class="card-aviso-tv">
            <div style="font-size: 1.6rem; color: var(--amarelo); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid var(--amarelo); padding-bottom: 5px; font-weight:bold;">${item.titulo || 'Comunicado Oficial'}</div>
            <div class="texto-aviso-tv">${item.link}</div>
          </div>
        `;
      }

      idxM = (idxM + 1) % midias.length;
      let tempoMili = (parseFloat(item.tempo) || 15) * 1000;
      timerMidia = setTimeout(girarM, tempoMili);
    }

    function girarF() {
      if (timerFrase) clearTimeout(timerFrase);
      if (!frases.length) return;

      document.getElementById('texto-frase').innerText = `"${frases[idxF]}"`;
      idxF = (idxF + 1) % frases.length;
      timerFrase = setTimeout(girarF, 25000);
    }

    window.onload = () => {
      verificarLoginExistente();
    };
  </script>
</body>
</html>
